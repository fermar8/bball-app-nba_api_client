name: Dependabot - Build and Test

on:
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    name: Build and Test (Dependabot)
    # Only run on Dependabot PRs
    if: github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Setup Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        id: run-tests
        run: python -m unittest test_integration

      - name: Verify app can be imported
        id: verify-import
        run: |
          python -c "from app import create_app; app = create_app(); print('✓ App imports and initializes successfully')"

      - name: Comment PR with status
        if: always()
        uses: actions/github-script@v9
        with:
          script: |
            const status = '${{ job.status }}' === 'success' ? '✅ All checks passed!' : '❌ Some checks failed';
            const testsOutcome = '${{ steps.run-tests.outcome }}' || 'N/A';
            const importOutcome = '${{ steps.verify-import.outcome }}' || 'N/A';
            const statusMessage = status === '✅ All checks passed!' ? 'Ready for auto-merge if this is a minor/patch update.' : 'Please review the failures before merging.';
            
            const comment = '### Dependabot Build Status\n\n' + 
              status + '\n\n' +
              '- **Tests**: ' + testsOutcome + '\n' +
              '- **Import verification**: ' + importOutcome + '\n\n' +
              statusMessage;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
